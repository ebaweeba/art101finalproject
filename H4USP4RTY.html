<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>H4US P4RTY!</title>

    <link rel="stylesheet" href="final.css">

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="final.js" defer></script>
</head>

<body>

    <div class="page">

        <h1>H4US P4RTY!</h1>

        <div id="instructions">
            <p>
                Click on a group member and find out what house party
                they're hosting or going to!
            </p>
        </div>

        <div class="members">

            <div class="member" id="esa-icon">
                <img src="images/esadrawing.png" alt="Esa">
                <p>Esa</p>
            </div>

            <div class="member" id="danie-icon">
                <img src="images/doggo.jpg" alt="Danie">
                <p>Danie</p>
            </div>

            <div class="member" id="bodie-icon">
                <img src="images/dog.jpg" alt="Bodie">
                <p>Bodie</p>
            </div>

            <div class="member" id="chelsea-icon">
                <img src="images/puppy.jpg" alt="Chelsea">
                <p>Chelsea</p>
            </div>

            <div class="member" id="harlan-icon">
                <img src="images/dalmation.jpg" alt="Harlan">
                <p>Harlan</p>
            </div>

        </div>


        <div id="esa-popup">
            <button id="close-esa">✕</button>
            <h2>Esa's Party</h2>
            <p>
                Esa is hosting a dog-themed party!
            </p>
        </div>




        <div id="danie-popup">
            <button id="close-danie">✕</button>
            <h2>Danie's Party</h2>
            <p>
                Danie is hosting a movie marathon with snacks,
                blankets, and a very competitive game of Mario Kart.
            </p>

        </div>


    </div>

</body>

</html>
