<!doctype html>
<html lang="en">

<head>
    <!-- All techy stuff goes here, inside HEAD -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Link to external CSS file -->

<body>

    <div id="page">
        <div class="image-section">

            <h1>build your own circus!</h1>

            <button id="background-button">1. change the background?</button>

            <div id="output"></div>


    <p id="status">2. meet the members of the circus!</p>

     <div id="instructions">
            <p>
                click each member to learn about them, or hover over them to see what they have to say for themselves. <br>
                use the spacebar to pick up and rearrange the circus members as you wish!
            </p>
        </div>


        <div id="scene">
            <div id="creature1">
                <div id="thought1"> hello, my name is mr. cat! </div>
            </div>

        </div>



            <div class="clown-section">
                <img src="images/clown.png" />

                <button id="comfort-button">Comfort the clown</button>

                <div class="glitter-section">
                    <img src="images/glitter.png" />

                    <button id="glitter-button">Interact with glitter</button>

                    <div id="glitter-output"></div>
                </div>
            </div>

            <div class="below-section">
                <img src="images/image.png" />
            </div>
        </div>


</body>
